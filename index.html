<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <!-- Icon -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <!-- Tittle -->
  <title>Time Tracking Dashboard</title>

  <!-- Styles -->
  <link rel="stylesheet" href="./css/styles.css">

  <!-- Family Font -->
  <link rel="preload" href="./assets/fonts/Rubik-Light.woff2" type="font/woff2" as="font" crossorigin>
  <link rel="preload" href="./assets/fonts/Rubik-Regular.woff2" type="font/woff2" as="font" crossorigin>
  <link rel="preload" href="./assets/fonts/Rubik-Medium.woff2" type="font/woff2" as="font" crossorigin>

</head>
<body>

  <main class="dashboard">
    <section class="profile-card"> <!-- Agregar el color azul de fondo-->
      <div> 
        <div class="profile-card__info"> <!-- Agregar el color azul bajito -->
          <img class="profile-card__picture" src="./images/image-jeremy.png" alt="Jeremy Robson">

          <div class="profile-card__container">
            <p class="profile-card__text">Report for</p>

            <h1 class="profile-card__name">Jeremy Robson</h1>
          </div>
        </div>

        <div class="profile-card__options">
          <button class="profile-card__option">Daily</button>

          <button class="profile-card__option">Weekly</button>

          <button class="profile-card__option">Monthly</button>
        </div>
      </div>
    </section>

    <section class="activity-card activity-card--work"> <!-- Agregar el color naranja de fondo-->
      <img class="activity-card__picture" src="./images/icon-work.svg" alt="">

      <div class="activity-card__info"> <!-- Agregar el color azul de fondo-->
        <div class="activity-card__top-row">
          <h2 class="activity-card__title">Work</h2>

          <button class="activity-card__menu" aria-label="Menu"><img src="./images/icon-ellipsis.svg" alt=""></button>
        </div>

        <div class="activity-card__time">
          <p class="activity-card__hours">32hrs</p>

          <p class="activity-card__average">Last Week - 36hrs</p>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
